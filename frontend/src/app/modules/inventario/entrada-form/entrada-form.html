<app-modal titulo="Registrar Mercancía" [abierto]="abierto" (cerrar)="cerrar.emit()">

    <div class="space-y-5">

        <!-- Producto -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Producto
            </label>

            <select
                [(ngModel)]="form.productoId"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-white
                    focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" >

                <option value="" disabled>Selecciona un producto...</option>

                    @for (p of productos; track p._id) {
                        <option [value]="p._id">{{ p.nombre }}</option>
                    }
            </select>
        </div>

        <!-- Cantidad -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Cantidad recibida
            </label>    
            <div class="flex items-center gap-3">
                <button
                type="button"
                (click)="decrementar()"
                class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center
                        text-gray-500 hover:bg-gray-50 hover:border-gray-300 transition-colors" >
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                </button>

                <input
                type="number"
                [(ngModel)]="form.cantidad"
                min="0"
                placeholder="0"
                class="w-24 text-center px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" />

                <button
                type="button"
                (click)="incrementar()"
                class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center
                        text-gray-500 hover:bg-gray-50 hover:border-gray-300 transition-colors" >
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </button>
            </div>
            
            <p class="text-xs text-gray-400 mt-1.5">La cantidad se sumará directamente al stock actual.</p>
        </div>

        <!-- Notas -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Notas (opcional)
            </label>

            <textarea
                [(ngModel)]="form.notas"
                rows="3"
                placeholder="Ej. Pedido proveedor semanal..."
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg resize-none
                    focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" >
            </textarea>
        </div>

        <!-- Acciones -->
        <div class="flex items-center justify-end gap-3 pt-1">
            <button
                (click)="cerrar.emit()"
                class="px-4 py-2.5 text-sm font-medium text-gray-600 border border-gray-200
                    rounded-lg hover:bg-gray-50 transition-colors" >
                Cancelar
            </button>

            <button
                (click)="guardarModal()"
                class="px-4 py-2.5 text-sm font-semibold text-white bg-red-500
                    hover:bg-red-600 rounded-lg transition-colors" >
                Guardar Stock
            </button>
        </div>
    </div>

</app-modal>
