<app-modal [titulo]="titulo" [abierto]="abierto" (cerrar)="cerrar.emit()">

    <div class="space-y-4">

        <!-- Nombre -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Nombre del producto
            </label>

            <input
                type="text"
                [(ngModel)]="form.nombre"
                placeholder="Ej. Pastel 3 Leches Clásico"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                    focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" />
        </div>

        <!-- Precio -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Precio de venta
            </label>

            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm text-gray-400">$</span>

                <input
                type="number"
                [(ngModel)]="form.precio"
                min="0"
                step="0.01"
                placeholder="0.00"
                class="w-full pl-7 pr-3 py-2.5 text-sm border border-gray-200 rounded-lg
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" />
            </div>
        </div>

        <!-- Categoría principal -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Categoría
            </label>

            <div class="flex flex-wrap gap-2">
                @for (cat of categoriasPrincipales; track cat._id) {
                    <button
                        type="button"
                        (click)="seleccionarCategoriaPrincipal(cat._id)"
                        class="px-3 py-1.5 rounded-lg text-sm font-medium border transition-colors"
                        [class.bg-red-500]="form.categoriaId === cat._id || categoriaPrincipalSeleccionadaId === cat._id"
                        [class.text-white]="form.categoriaId === cat._id || categoriaPrincipalSeleccionadaId === cat._id"
                        [class.border-red-500]="form.categoriaId === cat._id || categoriaPrincipalSeleccionadaId === cat._id"
                        [class.border-gray-200]="categoriaPrincipalSeleccionadaId !== cat._id"
                        [class.text-gray-600]="categoriaPrincipalSeleccionadaId !== cat._id">
                    {{ cat.nombre }}
                    </button>
                }
            </div>
        </div>

        <!-- Subcategoría (solo si la categoría padre tiene hijos) -->
        @if (mostrarSubcategorias) {
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Subcategoría
                </label>

                <select
                [(ngModel)]="form.categoriaId"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-white
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" >
                    <option value="" disabled>Seleccionar subcategoría...</option>
                    
                    @for (sub of subcategoriasSeleccionadas; track sub._id) {
                        <option [value]="sub._id">{{ sub.nombre }}</option>
                    }
                </select>
            </div>
        }

         <!-- Stock mínimo y máximo -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Stock mínimo
                </label>

                <input
                type="number"
                [(ngModel)]="form.stockMinimo"
                min="0"
                placeholder="Ej. 5"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                />

                <p class="text-xs text-gray-400 mt-1">Alerta de stock crítico.</p>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Stock máximo
                </label>

                <input
                type="number"
                [(ngModel)]="form.stockMaximo"
                min="0"
                placeholder="Ej. 50"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                />
                
                <p class="text-xs text-gray-400 mt-1">Límite de inventario.</p>
            </div>
        </div>

        <!-- Descripción -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Descripción breve
            </label>

            <textarea
                [(ngModel)]="form.descripcion"
                rows="3"
                placeholder="Ingredientes o notas de preparación..."
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg resize-none
                    focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent">
            </textarea>
        </div>
            @if (!formularioValido) {
            <p class="text-xs text-gray-400">
                Completa todos los campos correctamente para continuar.
            </p>
            }

        <!-- Acciones -->
        <div class="flex items-center justify-end gap-3 pt-2">
            <button
                (click)="cerrar.emit()"
                class="px-4 py-2.5 text-sm font-medium text-gray-600 border border-gray-200
                    rounded-lg hover:bg-gray-50 transition-colors" >
                Cancelar
            </button>

            <button
                (click)="guardar()"
                [disabled]="!formularioValido"
                class="px-4 py-2.5 text-sm font-semibold text-white rounded-lg transition-colors
                    bg-red-500 hover:bg-red-600
                    disabled:bg-gray-300 disabled:cursor-not-allowed">
                {{ esEdicion ? 'Guardar cambios' : 'Guardar producto' }}
            </button>
        </div>
    </div>

</app-modal>
