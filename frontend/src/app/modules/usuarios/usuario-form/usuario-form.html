<app-modal titulo="Nuevo Usuario" [abierto]="abierto" (cerrar)="cerrar.emit()">

    <div class="space-y-4">

        <!-- Mensaje de error -->
        @if (errorMessage) {
            <div class="bg-red-50 border border-red-200 rounded-lg p-3">
                <p class="text-sm text-red-600">{{ errorMessage }}</p>
            </div>
        }

        <!-- Nombre -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Nombre completo *
            </label>

            <input
                type="text"
                [(ngModel)]="form.nombre"
                placeholder="Ej. Ana García"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                    focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                [class.border-red-300]="errorMessage && !form.nombre?.trim()"/>
        </div>

        <!-- Email -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Correo electrónico *
            </label>

            <input
                type="email"
                [(ngModel)]="form.email"
                placeholder="user@bakepos.com"
                class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg
                    focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                [class.border-red-300]="errorMessage && !form.email?.trim()"/>
        </div>

        <!-- Contraseña -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                Contraseña temporal *
            </label>
            <div class="relative">
                <input
                [type]="mostrarPassword ? 'text' : 'password'"
                [(ngModel)]="form.password"
                placeholder="••••••••"
                class="w-full px-3 py-2.5 pr-10 text-sm border border-gray-200 rounded-lg
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                [class.border-red-300]="errorMessage && (!form.password?.trim() || (form.password && form.password.length < 6))"/>

                <button
                    type="button"
                    (click)="mostrarPassword = !mostrarPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                    @if (mostrarPassword) {
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                    } @else {
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    }
                </button>
            </div>

            <p class="text-xs text-gray-400 mt-1">Se le pedirá al usuario cambiarla en su primer inicio de sesión.</p>
        </div>

        <!-- Rol -->
        <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
                Rol del usuario *
            </label>
            <div class="grid grid-cols-2 gap-3"
                [class.ring-2]="errorMessage && !form.rol"
                [class.ring-red-300]="errorMessage && !form.rol">

                <!-- Administrador -->
                <button
                type="button"
                (click)="seleccionarRol('Administrador')"
                class="flex flex-col items-start p-3 rounded-xl border-2 transition-all text-left"
                [class.border-red-400]="form.rol === 'Administrador'"
                [class.bg-red-50]="form.rol === 'Administrador'"
                [class.border-gray-200]="form.rol !== 'Administrador'" >

                    <div class="w-8 h-8 rounded-lg mb-2 flex items-center justify-center"
                        [class.bg-red-100]="form.rol === 'Administrador'"
                        [class.bg-gray-100]="form.rol !== 'Administrador'">
                        <svg class="w-4 h-4"
                            [class.text-red-600]="form.rol === 'Administrador'"
                            [class.text-gray-400]="form.rol !== 'Administrador'"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>

                    <p class="text-sm font-semibold"
                        [class.text-red-700]="form.rol === 'Administrador'"
                        [class.text-gray-700]="form.rol !== 'Administrador'">
                        Administrador
                    </p>
                    
                    <p class="text-xs mt-0.5"
                        [class.text-red-500]="form.rol === 'Administrador'"
                        [class.text-gray-400]="form.rol !== 'Administrador'">
                        Acceso total al sistema
                    </p>
                </button>

                <!-- Empleado -->
                <button
                type="button"
                (click)="seleccionarRol('Empleado')"
                class="flex flex-col items-start p-3 rounded-xl border-2 transition-all text-left"
                [class.border-blue-400]="form.rol === 'Empleado'"
                [class.bg-blue-50]="form.rol === 'Empleado'"
                [class.border-gray-200]="form.rol !== 'Empleado'">

                    <div class="w-8 h-8 rounded-lg mb-2 flex items-center justify-center"
                        [class.bg-blue-100]="form.rol === 'Empleado'"
                        [class.bg-gray-100]="form.rol !== 'Empleado'">
                        <svg class="w-4 h-4"
                            [class.text-blue-600]="form.rol === 'Empleado'"
                            [class.text-gray-400]="form.rol !== 'Empleado'"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>

                    <p class="text-sm font-semibold"
                        [class.text-blue-700]="form.rol === 'Empleado'"
                        [class.text-gray-700]="form.rol !== 'Empleado'">
                        Empleado
                    </p>
                    
                    <p class="text-xs mt-0.5"
                        [class.text-blue-500]="form.rol === 'Empleado'"
                        [class.text-gray-400]="form.rol !== 'Empleado'">
                        Funciones de venta básicas
                    </p>
                </button>
            </div>
        </div>

        <!-- Acciones -->
        <div class="flex items-center justify-end gap-3 pt-2">
            <button
                (click)="cerrar.emit()"
                class="px-4 py-2.5 text-sm font-medium text-gray-600 border border-gray-200
                    rounded-lg hover:bg-gray-50 transition-colors" >
                Cancelar
            </button>

            <button
                (click)="guardar()"
                [disabled]="isLoading"
                class="px-4 py-2.5 text-sm font-semibold text-white bg-red-500
                    hover:bg-red-600 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                {{ isLoading ? 'Creando...' : 'Crear Empleado' }}
            </button>
        </div>
    </div>

</app-modal>
