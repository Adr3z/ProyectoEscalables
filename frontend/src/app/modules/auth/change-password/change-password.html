<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-10 h-10 bg-red-500 rounded-lg flex items-center justify-center shrink-0">
        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="10" width="18" height="10" rx="2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M3 10L12 5L21 10" />
          <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M5 14c2-2 4 2 6 0s4-2 6 0" />
          <circle cx="12" cy="6" r="1.5" stroke-width="1.5" />
          <path stroke-width="1.5" stroke-linecap="round" d="M12 4c0-1.5-1-2.5-2-3" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 mt-2">BakePOS</h1>
      <p class="text-sm text-gray-500 mt-1">Cambia tu contraseña</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-8">
      <div *ngIf="message" class="mb-4 px-4 py-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-600">
        {{ message }}
      </div>
      <div *ngIf="error" class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">
        {{ error }}
      </div>

      <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
        <div *ngIf="!isTempPassword" class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña actual</label>
          <input
            type="password"
            formControlName="currentPassword"
            placeholder="••••••••"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
          />
          <p *ngIf="changePasswordForm.get('currentPassword')?.touched && changePasswordForm.get('currentPassword')?.invalid" class="text-xs text-red-500 mt-2">
            La contraseña actual es obligatoria.
          </p>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nueva contraseña</label>
          <input
            type="password"
            formControlName="newPassword"
            placeholder="••••••••"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
          />
          <p *ngIf="changePasswordForm.get('newPassword')?.touched && changePasswordForm.get('newPassword')?.errors?.['required']" class="text-xs text-red-500 mt-2">
            La nueva contraseña es obligatoria.
          </p>
          <p *ngIf="changePasswordForm.get('newPassword')?.touched && changePasswordForm.get('newPassword')?.errors?.['minlength']" class="text-xs text-red-500 mt-2">
            La contraseña debe tener al menos 6 caracteres.
          </p>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar nueva contraseña</label>
          <input
            type="password"
            formControlName="confirmPassword"
            placeholder="••••••••"
            class="w-full px-3 py-2.5 rounded-lg border border-gray-300 text-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
          />
          <p *ngIf="changePasswordForm.errors?.['mismatch'] && changePasswordForm.get('confirmPassword')?.touched" class="text-xs text-red-500 mt-2">
            Las contraseñas no coinciden.
          </p>
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-red-500 hover:bg-red-600 disabled:bg-red-300 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-lg text-sm transition-colors"
        >
          {{ isLoading ? 'Guardando…' : 'Actualizar contraseña' }}
        </button>
      </form>

      <p class="mt-5 text-center text-xs text-gray-400">
        <a routerLink="/login" class="hover:text-gray-600 transition-colors">Cancelar</a>
      </p>
    </div>

    <div class="mt-6 text-center">
      <p class="text-xs text-gray-300">BakePOS v1.0.0</p>
    </div>
  </div>
</div>
