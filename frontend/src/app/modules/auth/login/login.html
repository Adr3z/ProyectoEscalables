<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-sm">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-10 h-10 bg-red-500 rounded-lg flex items-center justify-center shrink-0">
                <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <!-- Base del pastel -->
                    <rect x="3" y="10" width="18" height="10" rx="2"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

                    <!-- Parte superior (rebanada) -->
                    <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                        d="M3 10L12 5L21 10"/>

                    <!-- Relleno ondulado -->
                    <path stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                        d="M5 14c2-2 4 2 6 0s4-2 6 0"/>

                    <!-- Cereza -->
                    <circle cx="12" cy="6" r="1.5" stroke-width="1.5"/>
                    <path stroke-width="1.5" stroke-linecap="round"
                        d="M12 4c0-1.5-1-2.5-2-3"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-gray-900">BakePOS</h1>

            <p class="text-sm text-gray-500 mt-1">Bienvenido de nuevo</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl border border-gray-200 p-8">

            <!-- Error -->
            @if (error()) {
                <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600">
                    {{ error() }}
                </div>
            }

            <!-- Email -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Correo electrónico
                </label>

                <input
                type="email"
                [(ngModel)]="form.email"
                (input)="onInputChange()"
                placeholder="ejemplo@panaderia.com"
                class="w-full px-3 py-2.5 rounded-lg border border-gray-300 text-sm
                        focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                />
            </div>

            <!-- Password -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-1">
                    <label class="text-sm font-medium text-gray-700">Contraseña</label>
<!-- 
                    <a href="#" class="text-xs text-red-500 hover:text-red-600">
                        ¿Olvidaste tu contraseña?
                    </a> -->
                </div>

                <div class="relative">
                    <input
                        [type]="mostrarPassword ? 'text' : 'password'"
                        [(ngModel)]="form.password"
                        (input)="onInputChange()"
                        placeholder="••••••••"
                        class="w-full px-3 py-2.5 pr-10 rounded-lg border border-gray-300 text-sm
                            focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
                    />
                    <button
                    type="button"
                    (click)="mostrarPassword = !mostrarPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">

                        @if (mostrarPassword) {
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                                        a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243
                                        M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29
                                        m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0
                                        A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7
                                        a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        } @else {
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                                        -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        }
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button
                (click)="onSubmit()"
                [disabled]="isLoading() || hasRecentError()"
                class="w-full bg-red-500 hover:bg-red-600 disabled:bg-red-300 disabled:cursor-not-allowed
                    text-white font-semibold py-2.5 rounded-lg text-sm transition-colors" >
                @if (isLoading()) {
                    <div class="flex items-center justify-center gap-2">
                        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Iniciando sesión...
                    </div>
                } @else {
                    Iniciar sesión
                }
            </button>

            <!-- Soporte -->
            <!-- <p class="mt-5 text-center text-xs text-gray-400">
                ¿No tienes una cuenta?
                <a href="#" class="text-red-500 hover:underline font-medium">Contactar soporte</a>
            </p> -->
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center space-y-1">
            <!-- <p class="text-xs text-gray-400">Términos · Privacidad · Ayuda</p> -->
            <p class="text-xs text-gray-300">BakePOS v1.0.0</p>
        </div>
    </div>
</div>
