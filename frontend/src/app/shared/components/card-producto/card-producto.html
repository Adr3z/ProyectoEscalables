<div class="bg-white rounded-xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer group">

<!-- Imagen placeholder -->
    <div class="h-44 bg-gray-100 flex items-center justify-center overflow-hidden">
        <svg class="w-10 h-10 text-pink-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <!-- Base del pastel -->
            <rect x="3" y="10" width="18" height="10" rx="2"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Parte superior (rebanada) -->
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M3 10L12 5L21 10"/>

            <!-- Relleno ondulado -->
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M5 14c2-2 4 2 6 0s4-2 6 0"/>

            <!-- Cereza -->
            <circle cx="12" cy="6" r="1.5" stroke-width="2"/>
            <path stroke-width="2" stroke-linecap="round"
                d="M12 4c0-1.5-1-2.5-2-3"/>
        </svg>
    </div>

<!-- Info -->
    <div class="p-4">
        <p class="text-xs text-gray-400 mb-1">{{ producto.categoriaId?.nombre ?? 'Sin categoría' }}</p>

        <h3 class="text-sm font-semibold text-gray-800 truncate">{{ producto.nombre }}</h3>

        @if (producto.descripcion) {
            <p class="text-xs text-gray-500 mt-1 line-clamp-2">{{ producto.descripcion }}</p>
        }

        <div class="mt-3 flex items-center justify-between">
            <span class="text-base font-bold text-red-500">
                ${{ producto.precio | number:'1.2-2' }}
            </span>
            
            <span class="text-xs text-gray-400">{{ producto.stockActual }} uds.</span>
        </div>
    </div>

</div>
