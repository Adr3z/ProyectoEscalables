<button
    (click)="agregar.emit(producto)"
    class="relative w-full bg-white rounded-xl border transition-all text-left p-3
            hover:border-red-300 hover:shadow-sm active:scale-95"
    [class.border-red-400]="cantidadEnCarrito > 0"
    [class.border-gray-200]="cantidadEnCarrito === 0"
    >

    <!-- Badge cantidad -->
    @if (cantidadEnCarrito > 0) {
        <span class="absolute -top-2 -right-2 w-5 h-5 bg-red-500 text-white text-xs
                    font-bold rounded-full flex items-center justify-center z-10">
            {{ cantidadEnCarrito }}
        </span>
    }

    <!-- Imagen placeholder -->
    <div class="w-full aspect-square bg-gray-50 rounded-lg mb-2 flex items-center justify-center">
        <svg class="w-10 h-10 text-pink-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <!-- Base del pastel -->
            <rect x="3" y="10" width="18" height="10" rx="2"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Parte superior (rebanada) -->
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M3 10L12 5L21 10"/>

            <!-- Relleno ondulado -->
            <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M5 14c2-2 4 2 6 0s4-2 6 0"/>

            <!-- Cereza -->
            <circle cx="12" cy="6" r="1.5" stroke-width="2"/>
            <path stroke-width="2" stroke-linecap="round"
                d="M12 4c0-1.5-1-2.5-2-3"/>
        </svg>
    </div>

    <p class="text-xs font-medium text-gray-800 truncate leading-tight">{{ producto.nombre }}</p>
    <p class="text-xs text-gray-400 mt-0.5 truncate">{{ producto.categoria?.nombre }}</p>
    <p class="text-sm font-bold text-red-500 mt-1">${{ producto.precio | number:'1.2-2' }}</p>
</button>
