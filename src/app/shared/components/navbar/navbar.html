<header class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0">

<!-- Búsqueda -->
    <div class="relative w-72">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <input
        type="text"
        placeholder="Buscar producto..."
        class="w-full pl-9 pr-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-lg
                focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent"
        />
    </div>

<!-- Acciones -->
    <div class="flex items-center gap-3">

        <!-- Notificaciones -->
        <button class="relative p-3 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11
            a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5
            m6 0a3 3 0 11-6 0"/>
        </svg>
        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- Avatar -->
        <div class="flex items-center gap-2 cursor-pointer">
        <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white text-xs font-semibold">
            {{ usuarioNombre[0] }}
        </div>
        <div class="hidden sm:block">
            <p class="text-sm font-medium text-gray-700 leading-none">{{ usuarioNombre }}</p>
            <p class="text-xs text-gray-400 mt-0.5">{{ usuarioRol }}</p>
        </div>
        </div>

    </div>

</header>
