<aside class="w-60 bg-white border-r border-gray-200 flex flex-col h-full shrink-0">

    <!-- Logo -->
    <div class="h-14 flex items-center gap-2.5 px-5 border-b border-gray-200">
        <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center shrink-0">
            <svg class="w-10 h-10 text-pink-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <!-- Base del pastel -->
                <rect x="3" y="10" width="18" height="10" rx="2"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- Parte superior (rebanada) -->
                <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    d="M3 10L12 5L21 10"/>

                <!-- Relleno ondulado -->
                <path stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    d="M5 14c2-2 4 2 6 0s4-2 6 0"/>

                <!-- Cereza -->
                <circle cx="12" cy="6" r="1.5" stroke-width="2"/>
                <path stroke-width="2" stroke-linecap="round"
                    d="M12 4c0-1.5-1-2.5-2-3"/>
            </svg>
        </div>
        
        <div>
            <p class="text-sm font-bold text-gray-900 leading-none">BakePOS</p>
            <p class="text-xs text-gray-400 mt-0.5">{{ rolActual }}</p>
        </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        @for (item of itemsVisibles; track item.ruta) {
            <a
                [routerLink]="item.ruta"
                routerLinkActive="bg-red-500 text-white hover:bg-red-600"
                [routerLinkActiveOptions]="{ exact: false }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                    text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors" >
                    
                @switch (item.icono) {
                    @case ('catalogo') {
                        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                        </svg>
                    }
                    @case ('inventario') {
                        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/>
                        </svg>
                    }
                    @case ('pos') {
                        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m5-9v9m4-9v9"/>
                        </svg>
                    }
                    @case ('usuarios') {
                        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    }
                }

                {{ item.label }}
            </a>
        }
    </nav>

    <!-- Footer usuario -->
    <div class="px-3 py-4 border-t border-gray-200 space-y-1">
        <!-- Info usuario -->
        <div class="flex items-center gap-3 px-3 py-2">
            <div class="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center text-red-600 text-xs font-semibold shrink-0">
                AB
            </div>

            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-700 truncate leading-none">Ana Baker</p>
                <p class="text-xs text-gray-400 mt-0.5 truncate">{{ rolActual }}</p>
            </div>
        </div>

        <!-- Toggle rol (solo desarrollo) -->
        <button
        (click)="toggleRol()"
        class="w-full flex items-center gap-2 px-3 py-2 text-xs text-gray-400
                hover:text-gray-600 hover:bg-gray-50 rounded-lg transition-colors" >
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
            </svg>
            Cambiar a {{ rolActual === 'Administrador' ? 'Empleado' : 'Administrador' }}
        </button>

        <!-- Cerrar sesión -->
        <button class="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-500
                    hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            Cerrar sesión
        </button>
    </div>
</aside>
