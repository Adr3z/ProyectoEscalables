                        2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0

                        M9 6l3-3 3 3M9 6H6a2 2 0 00-2 2v10a2 2 0 002 2h12
                        a2 2 0 002-2V8a2 2 0 00-2-2h-3M9 6h6"/>
                    </svg>
                </div>

                <span class="text-sm font-bold text-gray-900">BakePOS</span>

            <!-- Búsqueda -->
            <div class="relative w-64 hidden sm:block">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"

                placeholder="Buscar productos..."
                class="w-full pl-9 pr-4 py-2 text-sm bg-gray-50 border border-gray-200 rounded-lg
                focus:outline-none focus:ring-2 focus:ring-red-400 focus:border-transparent" />
            </div>

            <!-- Acciones -->
            <div class="flex items-center gap-3">
                <a routerLink="/login" class="text-sm font-medium text-gray-600 hover:text-red-500 transition-colors" >
                Iniciar sesión
                </a>

                <a routerLink="/login" class="text-sm font-semibold bg-red-500 hover:bg-red-600 text-white
                px-4 py-2 rounded-lg transition-colors" >
                Acceder
                </a>
            </div>

        </div>
    </header>

    <!-- Contenido de la vista -->
    <main class="flex-1">
        <router-outlet/>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-6xl mx-auto px-6 py-6 flex flex-col sm:flex-row items-center justify-center gap-2">

                <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                    d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0

            <span class="text-xs text-gray-500">Fryda Renata Lara López.</span>
